[build]
publish = "public"
command = "pnpm install --frozen-lockfile && pnpm run deploy"

[build.environment]
HUGO_VERSION = "0.163.3"
GO_VERSION = "1.24.2"
NODE_VERSION = "22"
NPM_FLAGS = "--version" # silence Netlify's default 'npm install'; pnpm handles deps
HUGO_CACHEDIR = "/opt/build/cache/hugo_cache"
HUGO_ENV = "production"
