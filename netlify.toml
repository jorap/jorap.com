[build]
publish = "public"
command = "pnpm install --frozen-lockfile && pnpm project-setup && pnpm build"

[build.environment]
HUGO_VERSION = "0.146.5"
GO_VERSION = "1.24.2"
NODE_VERSION = "20"
NPM_FLAGS = "--version" # silence Netlify's default 'npm install'; pnpm handles deps
HUGO_CACHEDIR = "/opt/build/cache/hugo_cache"
