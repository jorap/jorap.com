######################## default configuration ####################
# The base URL of your site (required). This will be prepended to all relative URLs.
# Override per-environment via the HUGO_BASEURL env var (Vercel/Netlify/Amplify build settings).
baseURL = "https://www.jorap.com/"
# Title of your website (required).
title = "JoRap's World"
# Your theme name
theme = "jorap"
# Default time zone for time stamps; use any valid tz database name: https://en.wikipedia.org/wiki/List_of_tz_database_time_zones#List
timeZone = "Asia/Manila"
# post excerpt
summaryLength = 10 # see https://gohugo.io/content-management/excerpts/
# disable language
disableLanguages = [
] # example: ["fr"] for disable french language. see https://gohugo.io/content-management/multilingual/
hasCJKLanguage = false #  If hasCJKLanguage true, auto-detect Chinese/Japanese/Korean Languages in the content. see: https://gohugo.io/getting-started/configuration/#hascjklanguage
# default language
defaultContentLanguage = 'en'
# defaultContentLanguageInSubdir need to be true if you want to use the language code as a subdirectory and language specific 404 page
defaultContentLanguageInSubdir = false
disableHugoGeneratorInject = true

########################### Security #############################
# resources.GetRemote inspects the Content-Type of every fetched resource
# against a default allowlist. Google Fonts serves woff/woff2 binaries from
# fonts.gstatic.com which are not in the default allowlist, so the build-
# time font self-hoster (partials/essentials/self-hosted-fonts.html) would
# fail without these entries. The regexes below are additive to the
# defaults, not a replacement.
[security]
[security.http]
mediaTypes = ['^font/woff2?$', '^application/font-woff2?$']

########################### Services #############################
[services]
[services.googleAnalytics]
ID = 'G-MEASUREMENT_ID' # see https://gohugo.io/templates/internal/#configure-google-analytics

[services.disqus]
shortname = 'jorap' # we use disqus to show comments in blog posts . To install disqus please follow this tutorial https://portfolio.peter-baumgartner.net/2017/09/10/how-to-install-disqus-on-hugo/

########################## Privacy ##############################
[privacy]
[privacy.youtube]
disable = false
privacyEnhanced = true

########################## Permalinks ############################
[permalinks.page]
"pages" = "/:slugorcontentbasename/"


########################## Pagination ############################
[pagination]
disableAliases = false
pagerSize = 10
path = 'page'

# Related posts (blog single). Defaults only index keywords, date, and tags — not
# categories — so posts with empty tags never scored above threshold.
[related]
includeNewer = true
threshold = 80
toLower = false

[[related.indices]]
applyFilter = false
cardinalityThreshold = 0
name = 'keywords'
pattern = ''
toLower = false
type = 'basic'
weight = 100

[[related.indices]]
applyFilter = false
cardinalityThreshold = 0
name = 'date'
pattern = '2006'
toLower = false
type = 'basic'
weight = 10

[[related.indices]]
applyFilter = false
cardinalityThreshold = 0
name = 'tags'
pattern = ''
toLower = false
type = 'basic'
weight = 80

[[related.indices]]
applyFilter = false
cardinalityThreshold = 0
name = 'categories'
pattern = ''
toLower = false
type = 'basic'
weight = 80


############################# Build ##############################
[build]
[build.buildStats]
enable = true
[[build.cachebusters]]
source = 'assets/notwatching/hugo_stats\.json'
target = 'css'
# Tailwind v4 is compiled via css.TailwindCSS with inlineImports=true, so Hugo
# can't see the @import'd partials as resource dependencies. This cachebuster
# forces a CSS rebuild whenever any CSS file in assets changes (root or theme).
[[build.cachebusters]]
source = '(themes/[^/]+/)?assets/css/.+\.css$'
target = 'css'

############################# Modules ############################
[module]
[[module.mounts]]
source = 'assets'
target = 'assets'
[[module.mounts]]
disableWatch = true
source = 'hugo_stats.json'
target = 'assets/notwatching/hugo_stats.json'


############################# Outputs ############################
[outputs]
home     = ["HTML", "RSS", "WebAppManifest", "SearchIndex", "llms", "llmsfull", "md"]
page     = ["HTML", "RSS", "md"]
section  = ["HTML", "RSS", "md"]
taxonomy = ["HTML", "RSS", "md"]
term     = ["HTML", "RSS", "md"]

############################# Imaging ############################
[imaging]
# See https://github.com/disintegration/imaging
# Default JPEG or WebP quality setting. Default is 75.
quality = 80
resampleFilter = "Lanczos"

############################ Caches ##############################
[caches]
[caches.images]
dir = ":resourceDir/_gen"
maxAge = "720h"

[caches.assets]
dir = ":resourceDir/_gen"
maxAge = "720h"


############################ Markup ##############################
[markup]
[markup.goldmark.renderer]
unsafe = true

# Keep the typographer extension on (curly quotes, ellipses, angle quotes) but
# render `--` and `---` as literal ASCII hyphens instead of en/em dashes.
[markup.goldmark.extensions.typographer]
emDash = "--"
enDash = "-"

[markup.highlight]
style = 'monokai' # see https://xyproto.github.io/splash/docs/all.html
lineNumbersInTable = false

[markup.tableOfContents]
startLevel = 2
endLevel = 5
ordered = true


########################### Media types ###########################
[mediaTypes]
[mediaTypes."application/manifest+json"]
suffixes = ["webmanifest"]


########################### Output Format ##########################
[outputFormats]
[outputFormats.WebAppManifest]
mediaType = "application/manifest+json"
rel = "manifest"

[outputFormats.SearchIndex]
mediaType = "application/json"
baseName = "searchindex"
isPlainText = true
notAlternative = true


############################# Plugins ##############################

# CSS Plugins
# Font Awesome was removed in favor of inline SVGs (see data/icons.json +
# partials/components/icon.html). The referenced plugin/font-awesome/v6
# CSS files never shipped with the site, so the prior <i class="fa-…">
# tags were rendering as empty boxes anyway.
[[params.plugins.css]]
link = "plugins/swiper/swiper-bundle.css"
lazy = false
[[params.plugins.css]]
link = "plugins/glightbox/glightbox.css"
lazy = false

# JS Plugins
[[params.plugins.js]]
link = "js/search.js"
lazy = false
[[params.plugins.js]]
link = "plugins/swiper/swiper-bundle.js"
lazy = false
[[params.plugins.js]]
link = "plugins/cookie.js"
lazy = true
[[params.plugins.js]]
link = "plugins/glightbox/glightbox.js"
lazy = true
[[params.plugins.js]]
link = "js/gallery-slider.js"
lazy = true
[[params.plugins.js]]
link = "js/accordion.js"
lazy = true
[[params.plugins.js]]
link = "js/tab.js"
lazy = true
[[params.plugins.js]]
link = "js/modal.js"
lazy = true
[[params.plugins.js]]
link = "plugins/youtube-lite.js"
lazy = true
[[params.plugins.js]]
link = "js/toc.js"
lazy = false
[[params.plugins.js]]
link = "js/back-to-top.js"
lazy = true
[[params.plugins.js]]
link = "js/share.js"
lazy = true
