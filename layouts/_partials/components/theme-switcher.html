<!-- theme switcher (button) -->
{{ $class := .Class }}
{{ if site.Params.theme_switcher }}
  <button
    type="button"
    data-theme-switcher
    class="header-utility-control theme-switcher-btn text-ink hover:text-accent {{ $class }}"
    aria-label="Switch to dark mode"
    aria-pressed="false">
    <svg
      class="h-5 w-5 dark:hidden"
      viewBox="0 0 24 24"
      fill="currentColor"
      aria-hidden="true">
      <path
        fill-rule="evenodd"
        clip-rule="evenodd"
        d="M8.2 2.2c1-.4 2 .6 1.6 1.5-1 3-.4 6.4 1.8 8.7a8.4 8.4 0 0 0 8.7 1.8c1-.3 2 .5 1.5 1.5v.1a10.3 10.3 0 0 1-9.4 6.2A10.3 10.3 0 0 1 3.2 6.7c1-2 2.9-3.5 4.9-4.4Z" />
    </svg>
    <svg
      class="hidden h-5 w-5 dark:block"
      viewBox="0 0 56 56"
      fill="currentColor"
      aria-hidden="true">
      <path
        d="M30 4.6c0-1-.9-2-2-2a2 2 0 0 0-2 2v5c0 1 .9 2 2 2s2-1 2-2Zm9.6 9a2 2 0 0 0 0 2.8c.8.8 2 .8 2.9 0L46 13a2 2 0 0 0 0-2.9 2 2 0 0 0-3 0Zm-26 2.8c.7.8 2 .8 2.8 0 .8-.7.8-2 0-2.9L13 10c-.7-.7-2-.8-2.9 0-.7.8-.7 2.1 0 3ZM28 16a12 12 0 0 0-12 12 12 12 0 0 0 12 12 12 12 0 0 0 12-12 12 12 0 0 0-12-12Zm23.3 14c1.1 0 2-.9 2-2s-.9-2-2-2h-4.9a2 2 0 0 0-2 2c0 1.1 1 2 2 2ZM4.7 26a2 2 0 0 0-2 2c0 1.1.9 2 2 2h4.9c1 0 2-.9 2-2s-1-2-2-2Zm37.8 13.6a2 2 0 0 0-3 0 2 2 0 0 0 0 2.9l3.6 3.5a2 2 0 0 0 2.9 0c.8-.8.8-2.1 0-3ZM10 43.1a2 2 0 0 0 0 2.9c.8.7 2.1.8 3 0l3.4-3.5c.8-.8.8-2.1 0-2.9-.8-.8-2-.8-2.9 0Zm20 3.4c0-1.1-.9-2-2-2a2 2 0 0 0-2 2v4.9c0 1 .9 2 2 2s2-1 2-2Z" />
    </svg>
  </button>

  <script>
    (function () {
      "use strict";

      var DARK = "dark";
      var LIGHT = "light";
      var KEY = "theme";

      function readStored() {
        try { return localStorage.getItem(KEY); } catch (_) { return null; }
      }

      function writeStored(value) {
        try { localStorage.setItem(KEY, value); } catch (_) {}
      }

      function isDark() {
        return document.documentElement.classList.contains(DARK);
      }

      function syncControls(dark) {
        document.querySelectorAll("[data-theme-switcher]").forEach(function (el) {
          el.setAttribute("aria-pressed", dark ? "true" : "false");
          el.setAttribute(
            "aria-label",
            dark ? "Switch to light mode" : "Switch to dark mode",
          );
        });
      }

      function applyDark(dark) {
        document.documentElement.classList[dark ? "add" : "remove"](DARK);
        syncControls(dark);
      }

      document.querySelectorAll("[data-theme-switcher]").forEach(function (el) {
        syncControls(isDark());
        el.addEventListener("click", function () {
          var next = !isDark();
          applyDark(next);
          writeStored(next ? DARK : LIGHT);
        });
      });

      window.addEventListener("storage", function (e) {
        if (e.key !== KEY) return;
        if (e.newValue === DARK) applyDark(true);
        else if (e.newValue === LIGHT) applyDark(false);
      });

      {{ if eq site.Params.theme_default "system" }}
      if (window.matchMedia) {
        var mql = window.matchMedia("(prefers-color-scheme: dark)");
        var onSystemChange = function (e) {
          if (readStored() === null) applyDark(e.matches);
        };
        if (mql.addEventListener) mql.addEventListener("change", onSystemChange);
        else if (mql.addListener) mql.addListener(onSystemChange);
      }
      {{ end }}
    })();
  </script>
{{ end }}
