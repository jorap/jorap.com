descriptions:
  abide-in-me: Fruit comes from staying connected to Christ, not from forcing growth
    by willpower alone.
  accept-the-starting-line: Growth starts from the real starting line, not from a
    fantasy baseline.
  active-knowledge-curation: A folder of unread saves is not a garden - prune monthly
    and wire notes worth recommending.
  anti-fragile-systems: Plain files and open formats keep notes alive when an app
    shuts down.
  atomic-notes: One clear claim per note - split before the ands pile up.
  attention-economy: The feed runs like a slot machine someone else owns - if you
    are not paying, you are the product.
  attention-to-detail: Catch the typo and the edge case before they become an incident
    or a dumb customer email.
  build-a-reliable-default: A reliable default is the simple rehearsed move that runs
    when thinking is thin.
  building-a-personal-api: Frontmatter and folders shaped so future you and scripts
    need no fresh briefing every time.
  building-a-second-brain: The head is for thinking, not storing - notes hold what
    would otherwise get lost.
  blameless-after-action-review: After rollback restores service, the team learns what broke in the system - not who to punish for pushing deploy.
  by-their-fruits: Teachers are checked by what their teaching produces, not by how polished the talk sounds.
  capture: Saves what resonates into one trusted inbox, then empties weekly.
  change-window: Risky changes ship when someone awake can roll back, not Friday night when everyone is offline.
  childlike-faith: The kingdom is received like a child receives care, not negotiated
    on a merit ladder.
  christianity-and-politics: Caesar gets what Caesar is owed and God gets what is
    His - no party gets the soul.
  client-site-pass-off: Before deposit, name who publishes next and price the pass-off
    so launch is not a guessing game.
  commonplace-book: Before linked notes, quotes and ideas lived in one book worth
    reopening.
  context-aware-capture: A saved link is a mystery six weeks later unless the why
    is jotted while memory is fresh.
  creative-blocks: Thousands of notes and the page stays blank - one small ship action
    usually unsticks the work.
  daily-notes: The daily note is a scratch pad for today fragments, not a diary expected
    to last forever.
  decision-quality: Choices are judged by whether they hold after sleep, new facts,
    and the real bill - not the meeting high.
  deep-work: Hard thinking earns uninterrupted blocks; capture catches what tries
    to interrupt.
  deliberate-practice: Train the weak slice on purpose - feedback, correction, repeat
    - not the part already nailed.
  develop-dont-endanger: People grow through drills that build skill without pain
    or risk replacing the actual skill.
  digital-minimalism: Notes sharpen when extra apps, sync layers, and unused notifications
    drop away.
  digital-serendipity: Old notes surprise on schedule because links were made on purpose,
    not by luck.
  discipleship-vs-leadership: Discipleship is who you follow upward; leadership is
    who looks to you for direction and care.
  discipline: Do what was promised when nobody is clapping and motivation walked out.
  dont-copy-the-pattern: Culture default script is not neutral - refuse the pattern
    before reactions run on autopilot.
  duty-of-care: If roles flipped, reasonable protection from harm is the bar owed
    to people under you.
  eliminate-before-managing: Remove unnecessary danger first instead of stacking procedures
    and gear on top of it.
  emotional-regulation: Feel the spike without letting it pick the next sentence.
  energy-protects-judgment: Sleep and recovery protect judgment - tired calls land
    worse than rested calls on the same facts.
  ethical-leadership: What gets let slide in front of the team becomes their real
    standard, not the poster.
  evergreen-notes: Phrase ideas worth standing behind in two years and revise when
    reality shifts, not when a trend spikes.
  evergreen-vs-fleeting-notes: Sparks belong in fleeting notes; trusted claims belong
    in evergreen, with a clear path between them.
  expect-the-counter: Plan what happens after the other side adapts, not just how
    the opening move looks on paper.
  failure-as-feedback: A miss is signal about process or skill, not proof of being
    the wrong kind of person.
  faithfulness: The Spirit grows steady follow-through with what God entrusted, not
    one heroic sprint mistaken for earned salvation.
  finish-strong: Launch day excitement does not count - success is whether the last
    commitment actually got done.
  first-principles-thinking: First principles thinking rebuilds from what you actually
    believe, not someone else quote.
  follow-christ-then-lead: When leadership pressure and Christ command collide, follow
    Christ first - then lead from that footing.
  follow-their-lead: Join their world - topic, pace, starting point - before trying
    to steer.
  forgiveness: Extend the forgiveness already received, not ledger-keeping on debts
    Christ cleared.
  forgiveness-at-work: Release a colleague debt from the heart without pretending
    the slight did not matter or skipping boundaries where trust broke.
  future-proofing-knowledge: Future-proof notes with plain text, open tools, and exports
    tested before a vendor locks you in.
  god-centered-design: Design life and work around God glory first - not crowd applause,
    ego, or comfort.
  grace: Grace is gift never earned - salvation first, then the walk after - not wages
    that could be stacked.
  graph-view-analytics: Graph view analytics reads the link map for orphans, over-connected
    hubs, and forgotten gaps.
  grateful-obedience: Obedience flows from thanks because Christ already saved - not
    to buy or re-earn eternal life.
  habit-formation: Repeat one small move until it runs on autopilot instead of re-debating
    it every morning.
  habit-stacking: Piggyback a new tiny habit onto one that already runs without thinking,
    like notebook after coffee.
  honest-self-awareness: Name strengths, gaps, and limits plainly so change targets
    stay realistic.
  inbox-zero: Process the inbox to empty each week - decide, do not hoard.
  information-diet: Choose feeds on purpose because algorithm defaults are not neutral.
  integrity: What you do matches what you claim when applause, speed, or comfort are
    not watching.
  intellectual-sourcing: Cite sources in notes to trust synthesis and find the original
    later.
  judge-not: Final judge on souls is not your job - pull your own plank before nitpicking
    someone speck.
  leadership-is-influence: Influence moves people toward a shared goal - title optional, trust required.
  layered-reading: One pass through a book is not absorption - return when more depth is needed.
  lean-startup: Ship a rough test and learn rather than polish a product nobody wanted.
  let-your-light-shine: Good works are not for hiding - let people see the Father
    in how you live, not perform for applause.
  linking-by-meaning: Link notes so ideas meet in the graph without memorizing every
    folder path.
  literature-notes: After reading a source, write what stuck in your own words - not
    a pile of copied highlights.
  love-your-neighbor: Love others the way you would want care if roles flipped - second
    command, paired with loving God.
  low-hanging-fruit: The easy win available now - grab it before climbing for the
    hard stuff.
  maintenance-window: Block garden time on the calendar so broken links do not ambush
    on a random Sunday.
  measure-then-iterate: Name what to measure, gather signal, then reprioritize - not
    guess and overhaul.
  mental-models: Mental models are thinking shortcuts kept when they survive real
    decisions.
  mercy: Mercy withholds the punishment deserved and calls for the same compassion
    toward others.
  mind-mapping: Mind maps serve the messy first pass - branches, bubbles, relationships
    - then export to atomic notes.
  mobile-capture-workflows: Mobile capture is one tap to save the spark before scrolling
    away - share sheet to inbox.
  name-the-feeling: That sounds frustrating lands before the fix plan - name the emotion
    so nobody is guessing.
  network-analysis: Look at which notes connect everything else - those hubs show
    where the garden actually lives.
  own-your-part: Change your slice of the problem - do not wait for a hand-down fix
    from upstairs.
  patience: Wait without turning brittle - the Spirit grows a slow fuse, not a countdown
    to snapping.
  peacemakers: Pursue peace on purpose - repair, truth in love, de-escalation - not
    just staying quiet.
  people-centered-design: Design for real human needs first - customers, teammates,
    stakeholders - or the change will not stick.
  periodic-knowledge-review: Notes rot without revisit - calendar weekly and quarterly
    passes like bills.
  pkm: PKM is how you save, organize, and reuse what you learn - not a hobby of collecting
    apps.
  preparedness: Run the fire drill bored rather than improvise when the alarm is real.
  present-a-living-sacrifice: Offer the ordinary day to God first - thanks after mercy,
    not payment to earn grace.
  process-over-outcomes: One heroic sprint does not beat a routine you can rerun when
    motivation dips.
  read-later-queue: Save for later is fine until the queue turns into a guilt pile
    never touched.
  renewed-mind: Refuse the world default thinking - let Scripture reshape how you
    see, choose, and obey.
  resilience: Bend without lying that the hit did not cost anything.
  safety-by-design: Build workflows so the dangerous move is hard - not just a warning
    label and good intentions.
  safety-comes-first: Stop the unsafe thing first, then restore choice when the situation
    is stable.
  second-order-thinking: Ask what the clever fix triggers next - copycats, shortcuts,
    and incentives not planned for.
  secret-devotion: Give, pray, and fast for God to see - not for applause in the group
    chat.
  seek-the-kingdom-first: Put God rule first and let food, status, and tomorrow worry
    sort behind that.
  self-control: Pick the next move on purpose - the urge does not get to drive.
  selling-static-sites: Charge for the build and pass-off; hosting is a clear line
    item, not a mystery monthly bundle.
  servant-leadership: Unblock the team, coach through the mess, take blame up, and
    pass credit down.
  shadow-the-work: Watch one person do the real job before redrawing the process or
    the slide.
  share-what-you-learn: Write the doc, do the pass-off, and answer the junior question
    - hoarding know-how helps nobody.
  ship-it: Push the good-enough version live instead of polishing until the deadline
    owns you.
  signal-vs-noise: Save only what changes action or belief this month - most feeds
    are noise.
  situational-control: Steer pace, format, and who speaks in the room when you cannot
    own the whole outcome.
  slow-the-moment: Slow down one breath before answering - urgency is real, but it
    should not pick the move.
  spaced-repetition: Review on a schedule so ideas stick - retention, application,
    and explanation, not fact pile-up.
  staged-rollout: Ship to a small slice first so rollback stays cheap if the new state
    bleeds.
  standard-operating-procedures: Write short steps for deploys and incidents so nobody
    improvises when the clock is loud.
  standing-vs-fellowship: Standing with God is settled at faith; fellowship breaks
    when sin enters and restores when confessed.
  stay-effective-in-new-conditions: The habit that worked in the last role can flop
    in the next room - retune instead of clinging.
  success-is-stewardship: Success is borrowed - accountability is for how what was
    given gets used, not entitlement to keep it forever.
  sunk-cost-fallacy: Drop the bad tool or project when it stops earning its place
    - past effort is gone either way.
  sustainable-performance: Aim for a pace holdable next month without burning out
    or cutting safety corners.
  synthesis-as-a-goal: Merge sources into what you believe and can defend - a quote
    pile is not the goal.
  systems-thinking: Trace the loop behind the fire - inputs, delays, feedback - and
    fix the process, not tonight patch.
  take-up-your-cross: Deny self and follow Christ daily - his will over yours, not
    collecting suffering points.
  taxonomy: Tags, folders, and types are how notes get found later - classification
    in service of retrieval.
  the-12-week-year: Yearly goals compress into twelve-week arcs you can actually feel
    - wiki projects map to them.
  the-collectors-fallacy: Saving articles felt like progress until every save tied
    to an express deadline or got cut.
  the-feynman-technique: Teach the idea out loud to a blank page - wherever you stumble,
    understanding is not there yet.
  the-garage-concept: The vault is the garage for scraps and experiments - the blog
    is the showroom, kept separate.
  the-golden-rule: Treat people how you would want to be treated - active care, not
    just avoiding harm.
  the-knowledge-lifecycle: Ideas move through capture, use, polish, fade, and archive
    - match effort to the stage.
  the-narrow-way: The road to life is narrow and hard - the easy broad path is the
    one drift happens on.
  the-trusted-inbox: One capture pipe emptied every week - without trust, ideas hoard
    in the head instead.
  the-wise-builder: Hearing the words is not enough - build on rock by doing what
    Jesus said.
  treasure-in-heaven: Store up what lasts - generosity and obedience - not what rust,
    moth, and thieves can take.
  turn-the-other-cheek: When someone hits or insults you, do not hand back the same
    - break the retaliation loop.
  versatility: Plug into more than one lane when the team or the client needs a shift.
