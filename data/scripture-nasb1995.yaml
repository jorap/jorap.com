# NASB 1995 — canonical wording for direct scripture quotes in the notes garden.
# Commentary stays JoRap voice; quoted text matches this file.
verses:
  "Matthew 5:14-16":
    text: "You are the light of the world. A city set on a hill cannot be hidden; nor does anyone light a lamp and put it under a basket, but on the lampstand, and it gives light to all who are in the house. Let your light shine before men in such a way that they may see your good works, and glorify your Father who is in heaven."
  "Matthew 5:21-30":
    text: "You have heard that the ancients were told, 'YOU SHALL NOT COMMIT MURDER' and 'Whoever commits murder shall be liable to the court.' But I say to you that everyone who is angry with his brother shall be guilty before the court; and whoever says to his brother, 'You good-for-nothing,' shall be guilty before the supreme court; and whoever says, 'You fool,' shall be guilty enough to go into the fiery hell. If your right eye makes you stumble, tear it out and throw it from you; for it is better for you to lose one of the parts of your body, than for your whole body to be thrown into hell."
  "Matthew 5:22":
    text: "everyone who is angry with his brother shall be guilty before the court"
  "Matthew 5:23-24":
    text: "Therefore if you are presenting your offering at the altar, and there remember that your brother has something against you, leave your offering there before the altar and go; first be reconciled to your brother, and then come and present your offering."
  "Matthew 5:3-12":
    text: "Blessed are the poor in spirit, for theirs is the kingdom of heaven. Blessed are those who mourn, for they shall be comforted. Blessed are the gentle, for they shall inherit the earth. Blessed are those who hunger and thirst for righteousness, for they shall be satisfied. Blessed are the merciful, for they shall receive mercy. Blessed are the pure in heart, for they shall see God. Blessed are the peacemakers, for they shall be called sons of God. Blessed are those who have been persecuted for the sake of righteousness, for theirs is the kingdom of heaven."
  "Matthew 5:45":
    text: "He causes His sun to rise on the evil and the good, and sends rain on the righteous and the unrighteous."
  "Matthew 6:4":
    text: "so that your giving will be in secret; and your Father who sees what is done in secret will reward you."
  "Matthew 6:9-13":
    text: "Pray, then, in this way: 'Our Father who is in heaven, Hallowed be Your name. Your kingdom come. Your will be done, On earth as it is in heaven. Give us this day our daily bread. And forgive us our debts, as we also have forgiven our debtors. And do not lead us into temptation, but deliver us from evil.'"
  "Matthew 6:1-18":
    text: "Beware of practicing your righteousness before men to be noticed by them; otherwise you have no reward with your Father who is in heaven. But when you give to the poor, do not let your left hand know what your right hand is doing, so that your giving will be in secret; and your Father who sees what is done in secret will reward you. But you, when you pray, go into your inner room, close your door and pray to your Father who is in secret, and your Father who sees what is done in secret will reward you."
  "Matthew 6:27":
    text: "And who of you by being worried can add a single hour to his life's span?"
  "Matthew 7:1-5":
    text: "Do not judge so that you will not be judged. For in the way you judge, you will be judged; and by your standard of measure, it will be measured to you. Why do you look at the speck that is in your brother's eye, but do not notice the log that is in your own eye? Or how can you say to your brother, 'Let me take the speck out of your eye,' and behold, the log is in your own eye? You hypocrite, first take the log out of your own eye, and then you will see clearly to take the speck out of your brother's eye."
  "Matthew 7:16-20":
    text: "You will know them by their fruits. Grapes are not gathered from thorn bushes nor figs from thistles, are they? So every good tree bears good fruit, but the bad tree bears bad fruit. A good tree cannot produce bad fruit, nor can a bad tree produce good fruit. Every tree that does not bear good fruit is cut down and thrown into the fire. So then, you will know them by their fruits."
  "Matthew 18":
    text: "Then summoning him, his lord said to him, 'You wicked slave, I forgave you all that debt because you pleaded with me. Should you not also have had mercy on your fellow slave, in the same way that I had mercy on you?'"
  "John 15:1-11":
    text: "I am the true vine, and My Father is the vinedresser. Every branch in Me that does not bear fruit, He takes away; and every branch that bears fruit, He prunes it so that it may bear more fruit. Abide in Me, and I in you. As the branch cannot bear fruit of itself unless it abides in the vine, so neither can you unless you abide in Me. I am the vine, you are the branches; he who abides in Me and I in him, he bears much fruit, for apart from Me you can do nothing. These things I have spoken to you so that My joy may be in you, and that your joy may be made full."
  "Romans 12:1-2":
    text: "I urge you, brethren, by the mercies of God, to present your bodies a living and holy sacrifice, acceptable to God, which is your spiritual service of worship. And do not be conformed to this world, but be transformed by the renewing of your mind, so that you may prove what the will of God is, that which is good and acceptable and perfect."
  "Matthew 6:18":
    text: "so that your fasting will not be noticed by men, but by your Father who is in secret; and your Father who sees what is done in secret will reward you."
  "Mark 12:31":
    text: "The second is this, 'YOU SHALL LOVE YOUR NEIGHBOR AS YOURSELF.' There is no other commandment greater than these."
  "Matthew 5:16":
    text: "Let your light shine before men in such a way that they may see your good works, and glorify your Father who is in heaven."
  "Matthew 7:7-11":
    text: "Ask, and it will be given to you; seek, and you will find; knock, and it will be opened to you."
  "Matthew 16:24":
    text: "If anyone wishes to come after Me, he must deny himself, and take up his cross and follow Me."
  "Matthew 16:27":
    text: "For the Son of Man is going to come in the glory of His Father with His angels, and WILL THEN REPAY EVERY MAN ACCORDING TO HIS DEEDS."
  "Matthew 20:26-28":
    text: "whoever wishes to become great among you shall be your servant, and whoever wishes to be first among you shall be your slave; just as the Son of Man did not come to be served, but to serve, and to give His life a ransom for many."
  "Matthew 22:39":
    text: "YOU SHALL LOVE YOUR NEIGHBOR AS YOURSELF."
  "Matthew 25:21":
    text: "Well done, good and faithful slave. You were faithful with a few things, I will put you in charge of many things; enter into the joy of your master."
  "Matthew 25:29":
    text: "For to everyone who has, more shall be given, and he will have an abundance; but from the one who does not have, even what he does have shall be taken away."
  "Mark 1:15":
    text: "The time is fulfilled, and the kingdom of God is at hand; repent and believe in the gospel."
  "Mark 10:15":
    text: "Truly I say to you, whoever does not receive the kingdom of God like a child will not enter it at all."
  "Luke 6:40":
    text: "A pupil is not above his teacher; but everyone, after he has been fully trained, will be like his teacher."
  "Luke 9:23":
    text: "If anyone wishes to come after Me, he must deny himself, and take up his cross daily and follow Me."
  "Luke 18:14":
    text: "I tell you, this man went to his house justified rather than the other; for everyone who exalts himself will be humbled, but he who humbles himself will be exalted."
  "John 5:24":
    text: "Truly, truly, I say to you, he who hears My word, and believes Him who sent Me, has eternal life, and does not come into judgment, but has passed out of death into life."
  "John 6:47":
    text: "Truly, truly, I say to you, he who believes has eternal life."
  "John 7:17":
    text: "If anyone is willing to do His will, he will know of the teaching, whether it is of God or whether I speak from Myself."
  "John 8:31-32":
    text: "If you continue in My word, then you are truly disciples of Mine; and you will know the truth, and the truth will make you free."
  "John 10:28":
    text: "I give eternal life to them, and they will never perish; and no one will snatch them out of My hand."
  "John 14:15":
    text: "If you love Me, you will keep My commandments."
  "John 15:8":
    text: "My Father is glorified by this, that you bear much fruit, and so prove to be My disciples."
  "John 15:19":
    text: "If you were of the world, the world would love its own; but because you are not of the world, but I chose you out of the world, because of this the world hates you."
  "John 17:17":
    text: "Sanctify them in the truth; Your word is truth."
  "Matthew 5:3":
    text: "Blessed are the poor in spirit, for theirs is the kingdom of heaven."
  "Matthew 5:4":
    text: "Blessed are those who mourn, for they shall be comforted."
  "Matthew 5:5":
    text: "Blessed are the gentle, for they shall inherit the earth."
  "Matthew 5:6":
    text: "Blessed are those who hunger and thirst for righteousness, for they shall be satisfied."
  "Matthew 5:7":
    text: "Blessed are the merciful, for they shall receive mercy."
  "Matthew 5:8":
    text: "Blessed are the pure in heart, for they shall see God."
  "Matthew 5:9":
    text: "Blessed are the peacemakers, for they shall be called sons of God."
  "Matthew 5:10":
    text: "Blessed are those who have been persecuted for the sake of righteousness, for theirs is the kingdom of heaven."
  "Matthew 5:14":
    text: "You are the light of the world. A city set on a hill cannot be hidden."
  "Matthew 5:21-22":
    text: "You have heard that the ancients were told, 'YOU SHALL NOT COMMIT MURDER' and 'Whoever commits murder shall be liable to the court.' But I say to you that everyone who is angry with his brother shall be guilty before the court."
  "Matthew 5:28":
    text: "everyone who looks at a woman with lust for her has already committed adultery with her in his heart"
  "Matthew 5:33-37":
    text: "let your statement be, 'Yes, yes' or 'No, no'; anything beyond these is of evil"
  "Matthew 5:38-39":
    text: "An eye for an eye, and a tooth for a tooth. But I say to you, do not resist an evil person; but whoever slaps you on your right cheek, turn the other to him also."
  "Matthew 5:44-45":
    text: "love your enemies and pray for those who persecute you, so that you may be sons of your Father who is in heaven; for He causes His sun to rise on the evil and the good, and sends rain on the righteous and the unrighteous."
  "Matthew 6:1":
    text: "Beware of practicing your righteousness before men to be noticed by them; otherwise you have no reward with your Father who is in heaven."
  "Matthew 6:3-4":
    text: "when you give to the poor, do not let your left hand know what your right hand is doing, so that your giving will be in secret; and your Father who sees what is done in secret will reward you."
  "Matthew 6:6":
    text: "when you pray, go into your inner room, close your door and pray to your Father who is in secret, and your Father who sees what is done in secret will reward you."
  "Matthew 6:14-15":
    text: "if you forgive others for their transgressions, your heavenly Father will also forgive you. But if you do not forgive others, then your Father will not forgive your transgressions."
  "Matthew 6:19-21":
    text: "Do not store up for yourselves treasures on earth, where moth and rust destroy, and where thieves break in and steal. But store up for yourselves treasures in heaven, where neither moth nor rust destroys, and where thieves do not break in or steal; for where your treasure is, there your heart will be also."
  "Matthew 6:25-27":
    text: "do not be worried about your life, as to what you will eat or what you will drink; nor for your body, as to what you will put on. Is not life more than food, and the body more than clothing? And who of you by being worried can add a single hour to his life?"
  "Matthew 6:33":
    text: "seek first His kingdom and His righteousness, and all these things will be added to you."
  "Matthew 6:34":
    text: "do not worry about tomorrow; for tomorrow will care for itself. Each day has enough trouble of its own."
  "Matthew 7:1":
    text: "Do not judge so that you will not be judged."
  "Matthew 7:12":
    text: "In everything, therefore, treat people the same way you want them to treat you, for this is the Law and the Prophets."
  "Matthew 7:13-14":
    text: "Enter through the narrow gate; for the gate is wide and the way is broad that leads to destruction, and there are many who enter through it. For the gate is small and the way is narrow that leads to life, and there are few who find it."
  "Matthew 7:16":
    text: "You will know them by their fruits."
  "Matthew 7:21-23":
    text: "Not everyone who says to Me, 'Lord, Lord,' will enter the kingdom of heaven, but he who does the will of My Father who is in heaven will enter."
  "Matthew 7:24-27":
    text: "everyone who hears these words of Mine and acts on them, may be compared to a wise man who built his house on the rock."
  "Matthew 18:22":
    text: "I do not say to you, up to seven times, but up to seventy times seven."
  "Matthew 22:21":
    text: "Render to Caesar the things that are Caesar's; and to God the things that are God's."
  "Matthew 22:37-38":
    text: "YOU SHALL LOVE THE LORD YOUR GOD WITH ALL YOUR HEART, AND WITH ALL YOUR SOUL, AND WITH ALL YOUR MIND. This is the great and foremost commandment."
  "Matthew 28:19-20":
    text: "Go therefore and make disciples of all the nations, baptizing them in the name of the Father and the Son and the Holy Spirit, teaching them to observe all that I commanded you; and lo, I am with you always, even to the end of the age."
  "Mark 10:45":
    text: "For even the Son of Man did not come to be served, but to serve, and to give His life a ransom for many."
  "Luke 10:37":
    text: "Go and do the same."
  "John 3:16":
    text: "For God so loved the world, that He gave His only begotten Son, that whoever believes in Him shall not perish, but have eternal life."
  "John 15:5":
    text: "apart from Me you can do nothing."
  "Romans 3:24":
    text: "being justified as a gift by His grace through the redemption which is in Christ Jesus"
  "Romans 4:5":
    text: "to the one who does not work, but believes in Him who justifies the ungodly, his faith is credited as righteousness"
  "Romans 5:1":
    text: "Therefore, having been justified by faith, we have peace with God through our Lord Jesus Christ"
  "Romans 8:29":
    text: "to become conformed to the image of His Son"
  "Romans 12:1":
    text: "I urge you, brethren, by the mercies of God, to present your bodies a living and holy sacrifice, acceptable to God, which is your spiritual service of worship."
  "Romans 12:2":
    text: "And do not be conformed to this world, but be transformed by the renewing of your mind, so that you may prove what the will of God is, that which is good and acceptable and perfect."
  "1 Corinthians 3:12-15":
    text: "If any man's work is burned up, he will suffer loss; but he himself will be saved, yet so as through fire."
  "Galatians 5:19-21":
    text: "immorality, impurity, sensuality, idolatry, sorcery, enmities, strife, jealousy, outbursts of anger, disputes, dissensions, factions, envying, drunkenness, carousing"
  "Galatians 5:22-23":
    text: "the fruit of the Spirit is love, joy, peace, patience, kindness, goodness, faithfulness, gentleness, self-control"
  "Ephesians 2:4-5":
    text: "But God, being rich in mercy, because of His great love with which He loved us, even when we were dead in our transgressions, made us alive together with Christ (by grace you have been saved)"
  "Ephesians 2:8-9":
    text: "For by grace you have been saved through faith; and that not of yourselves, it is the gift of God; not as a result of works, so that no one may boast."
  "Ephesians 2:10":
    text: "For we are His workmanship, created in Christ Jesus for good works, which God prepared beforehand so that we would walk in them."
  "Deuteronomy 6:5":
    text: "You shall love the LORD your God with all your heart and with all your soul and with all your might."
