# yaml-language-server: $schema=https://unpkg.com/@sveltia/cms/schema/sveltia-cms.json

backend:
  name: github
  repo: jorap/jorap.com
  branch: master
  base_url: https://www.jorap.com
  auth_endpoint: /api/auth

media_folder: "assets/images"
# No leading slash: matches Hugo assets (images/...) and the theme image partial.
public_folder: "images"

collections:
  - name: "blog"
    label: "Blog Posts"
    folder: "content/english/blog"
    create: true
    slug: "{{slug}}"
    fields:
      - {label: "Title", name: "title", widget: "string"}
      - {
          label: "URL slug",
          name: "slug",
          widget: "string",
          required: false,
          hint: "Optional. Leave blank to derive from the filename; set to override the post URL.",
        }
      - {
          label: "Meta title",
          name: "meta_title",
          widget: "string",
          required: false,
          hint: "Optional. Shown in browser tab and search results when set.",
        }
      - {label: "Description", name: "description", widget: "text"}
      - {label: "Date", name: "date", widget: "datetime"}
      - {label: "Author", name: "author", widget: "string", default: "JoRap"}
      - {label: "Featured image", name: "image", widget: "image", required: false}
      - {
          label: "Categories",
          name: "categories",
          widget: "list",
          allow_add: true,
          required: false,
          field: {label: "Category", widget: "string"},
        }
      - {
          label: "Tags",
          name: "tags",
          widget: "list",
          allow_add: true,
          required: false,
          field: {label: "Tag", widget: "string"},
        }
      - {label: "Draft", name: "draft", widget: "boolean", default: false}
      - {label: "Body", name: "body", widget: "markdown"}
