# yaml-language-server: $schema=https://unpkg.com/@sveltia/cms/schema/sveltia-cms.json

backend:
  name: github
  repo: jorap/jorap.com
  branch: master
  base_url: https://www.jorap.com
  auth_endpoint: /api/auth

media_folder: "assets/images"
# No leading slash: matches Hugo assets (images/...) and the theme image partial.
public_folder: "images"

# Hugo shortcodes — registry in static/admin/jorap-shortcodes.js (jorap-* ids)
editor_components: &hugo_editor_components
  - code-block
  - jorap-youtube
  - jorap-youtube-time
  - jorap-youtube-lite
  - jorap-vimeo-lite
  - jorap-video
  - jorap-spotify
  - jorap-spotify-track
  - jorap-spotify-artist
  - jorap-image
  - jorap-gallery
  - jorap-slider
  - jorap-notice
  - jorap-button
  - jorap-accordion
  - jorap-tabs
  - jorap-modal
  - jorap-toc
  - jorap-card
  - jorap-mermaid
  - jorap-adsense

collections:
  - name: "blog"
    label: "Blog Posts"
    folder: "content/english/blog"
    create: true
    slug: "{{slug}}"
    fields:
      - {label: "Title", name: "title", widget: "string"}
      - {
          label: "URL slug",
          name: "slug",
          widget: "string",
          required: false,
          hint: "Optional. Leave blank to derive from the filename; set to override the post URL.",
        }
      - {
          label: "Meta title",
          name: "meta_title",
          widget: "string",
          required: false,
          hint: "Optional. Shown in browser tab and search results. ' | JoRap Notes' is appended automatically — do not include it here.",
        }
      - {label: "Description", name: "description", widget: "text"}
      - {label: "Date", name: "date", widget: "datetime"}
      - {label: "Author", name: "author", widget: "string", default: "JoRap"}
      - {label: "Featured image", name: "image", widget: "image", required: false}
      - {
          label: "Categories",
          name: "categories",
          widget: "list",
          allow_add: true,
          required: false,
          field: {label: "Category", widget: "string"},
        }
      - {
          label: "Tags",
          name: "tags",
          widget: "list",
          allow_add: true,
          required: false,
          field: {label: "Tag", widget: "string"},
        }
      - {label: "Draft", name: "draft", widget: "boolean", default: false}
      - {
          label: "Body",
          name: "body",
          widget: "markdown",
          editor_components: *hugo_editor_components,
        }

  - name: "notes"
    label: "Notes"
    folder: "content/english/notes"
    create: true
    slug: "{{slug}}"
    fields:
      - {label: "Title", name: "title", widget: "string"}
      - {
          label: "URL slug",
          name: "slug",
          widget: "string",
          required: false,
          hint: "Optional. Leave blank to derive from the filename; set to override the note URL.",
        }
      - {
          label: "Meta title",
          name: "meta_title",
          widget: "string",
          required: false,
          hint: "Optional. Shown in browser tab and search results. ' | JoRap Notes' is appended automatically — do not include it here.",
        }
      - {
          label: "Description",
          name: "description",
          widget: "text",
          hint: "One sentence: the single claim this note makes.",
        }
      - {label: "Date", name: "date", widget: "datetime"}
      - {
          label: "Featured image",
          name: "image",
          widget: "image",
          required: false,
          default: "/images/note.jpg",
        }
      - {
          label: "Categories",
          name: "categories",
          widget: "list",
          allow_add: true,
          required: false,
          field: {label: "Category", widget: "string"},
        }
      - {label: "Author", name: "author", widget: "string", default: "JoRap"}
      - {
          label: "Tags",
          name: "tags",
          widget: "list",
          allow_add: true,
          required: false,
          field: {label: "Tag", widget: "string"},
        }
      - {
          label: "Aliases",
          name: "aliases",
          widget: "list",
          allow_add: true,
          required: false,
          field: {label: "Alias", widget: "string"},
          hint: "Alternate titles for wikilink resolution, e.g. Second Brain for building-a-second-brain.",
        }
      - {label: "Featured", name: "featured", widget: "boolean", default: false}
      - {
          label: "Review deck",
          name: "review",
          widget: "boolean",
          default: false,
          hint: "Include this note's flashcards in /notes/review/ and the Anki export.",
        }
      - {
          label: "Card sets",
          name: "card_sets",
          widget: "list",
          allow_add: true,
          required: false,
          condition: {field: review, value: true},
          field: {label: "Set", widget: "string"},
          hint: "Filter labels on /notes/review/, e.g. Capture, Gospel, Workflow.",
        }
      - label: "Flashcards"
        name: "cards"
        widget: "list"
        required: false
        condition: {field: review, value: true}
        hint: "Six cards per spine note — life cue on the front, immediate move on the back."
        fields:
          - {label: "Front", name: "front", widget: "text"}
          - {label: "Back", name: "back", widget: "text"}
      - label: "Note kind"
        name: "note_kind"
        widget: "select"
        required: false
        hint: "Leave on Regular for most notes. Index for hub pages; meta for graph, review, flashcards, etc."
        options:
          - {label: "Regular note", value: ""}
          - {label: "Index / MOC", value: "index"}
          - {label: "Meta / utility", value: "meta"}
      - label: "Layout"
        name: "layout"
        widget: "select"
        required: false
        hint: "Only for utility pages (flashcards, graph, review). Leave on Default for normal notes."
        options:
          - {label: "Default", value: ""}
          - {label: "Cards", value: "cards"}
          - {label: "Graph", value: "graph"}
          - {label: "Issues", value: "issues"}
          - {label: "Review", value: "review"}
          - {label: "Backlinks", value: "backlinks"}
          - {label: "Create", value: "create"}
          - {label: "Random duo", value: "random-duo"}
      - {label: "Draft", name: "draft", widget: "boolean", default: true}
      - {
          label: "Body",
          name: "body",
          widget: "markdown",
          editor_components: *hugo_editor_components,
          hint: "Use [[wikilinks]] for links. Insert Hugo shortcodes from the toolbar (+). Optional ## Note Relationships table and ## See also section.",
        }
