<section class="section section--blog-list">
    <div class="container">
        <div class="row gx-5">
            <!-- blog posts -->
            <div class="lg:col-12">
                <div class="row">
                    <div class="mb-12 w-full md:col-12">
                        <h2 class="text-h1-sm md:text-h1 font-bold tracking-tight text-ink md:text-left">
                            Latest Blog Posts
                        </h2>
                    </div>
                    {{ $blogPages := where site.RegularPages "Section" "blog" }}
                    {{ $sortedPages := $blogPages.ByDate.Reverse }}
                    {{ $recentPosts := first 12 $sortedPages }}
                    {{ range $recentPosts }}
                    <div class="md:col-6 lg:col-4 mb-14">
                        {{ partial "components/blog-card" . }}
                    </div>
                    {{ end }}
                </div>
            </div>
        </div>
    </div>
</section>
