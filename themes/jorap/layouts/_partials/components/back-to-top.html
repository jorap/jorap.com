{{/* Back-to-top button. Behavior in assets/js/back-to-top.js, styles below moved to themes/jorap/assets/css/components.css. */}}
<div id="back-to-top" class="fixed bottom-8 right-8 z-50 hidden">
  <div class="relative">
    <svg class="progress-ring text-accent" width="48" height="48" aria-hidden="true">
      <circle class="progress-ring__circle progress-ring__background"
        stroke="currentColor" stroke-width="6" fill="transparent"
        r="20" cx="24" cy="24" style="opacity:.2"></circle>
      <circle class="progress-ring__circle progress-ring__progress text-sky-500"
        stroke-dasharray="125.6" stroke-dashoffset="125.6" stroke-width="6"
        stroke="currentColor" fill="transparent" r="20" cx="24" cy="24"></circle>
    </svg>
    <button type="button" aria-label="Back to top" data-back-to-top
      class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 flex h-10 w-10 items-center justify-center rounded-full bg-accent text-on-accent shadow-lg transition-colors duration-200 hover:opacity-90 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-accent focus-visible:ring-offset-2 motion-reduce:transition-none">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" aria-hidden="true">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 15l7-7 7 7"></path>
      </svg>
    </button>
  </div>
</div>
