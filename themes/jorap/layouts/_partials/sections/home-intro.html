{{ $h := site.Params.home_intro }}
{{ if and $h $h.enable }}
  <div class="mb-10 max-w-3xl md:mb-14">
    {{/*
    <h1 class="text-balance text-h1-sm font-bold tracking-tight text-ink md:text-h1">
      {{ if $h.heading }}
        {{ $h.heading }}
      {{ else }}
        {{ site.Title }}
      {{ end }}
    </h1>
    */}}
    {{ with $h.subheading }}
      <p class="mt-3 text-xl font-semibold text-ink md:text-2xl">{{ . }}</p>
    {{ end }}
    {{ with $h.lede }}
      <p class="mt-5 text-base leading-relaxed text-ink-muted md:text-lg">{{ . }}</p>
    {{ end }}
  </div>
{{ end }}
